name: InstallHelm
description: 'Installs helm'
inputs:
  version:
    description: "Version of Helm to install"
    required: true
runs:
  using: "composite"
  steps:
    - name: install helm
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        chmod +x ./hack/scripts/install_helm.sh
        ./hack/scripts/install_helm.sh
    - name: install helm-diff
      shell: bash
      run: |
        helm plugin install https://github.com/databus23/helm-diff || true